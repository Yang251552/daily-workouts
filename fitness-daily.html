    sumo:     { name: '相扑深蹲',    targets: ['臀部', '大腿后侧'],     art: A + 'sumo-squat.png',              url: 'https://www.bilibili.com/video/BV1GY411F7mE', vt: '一对哑铃8个动作，在家练遍全身肌肉+燃掉脂肪！' },
    press:    { name: '哑铃推举',    targets: ['三角肌', '三头肌'],     art: A + 'dumbbell-overhead-press.png', url: 'https://www.bilibili.com/video/BV14B4y1176U', vt: '最糟糕的8个哑铃动作，永远不要这样练！' },
    leanpush: { name: '前倾俯卧撑',  targets: ['三角肌前束', '三头肌'], art: A + 'forward-leaning-push-up.png', url: 'https://www.bilibili.com/video/BV17h411p75Q', vt: '让你肌肉暴涨的5种俯卧撑' },
    row:      { name: '哑铃俯身划船', targets: ['背阔肌', '肱二头肌'], art: A + 'dumbbell-bent-over-row.png',  url: 'https://www.bilibili.com/video/BV14B4y1176U', vt: '最糟糕的8个哑铃动作，永远不要这样练！' },
    curl:     { name: '哑铃弯举',    targets: ['肱二头肌'],             art: A + 'dumbbell-bicep-curl.png',     url: 'https://www.bilibili.com/video/BV17x4y1b7A8', vt: '练小臂用3个技巧，摆脱细弱，迅速增粗！' },
    pushup:   { name: '标准俯卧撑',  targets: ['胸肌', '肩膀', '三头肌'], art: A + 'standard-push-up.png',        url: 'https://www.bilibili.com/video/BV17F411u7Yx', vt: '俯卧撑少了这5个技巧，肌肉很难增长' },
    pushup2:  { name: '俯卧撑',      targets: ['胸肌', '肩膀', '三头肌'], art: A + 'standard-push-up.png',        url: 'https://www.bilibili.com/video/BV16e4y1p7ji', vt: '这个练习，能让俯卧撑数量飞速提升!' },
    crunch:   { name: '卷腹',        targets: ['核心'],                 art: A + 'crunch.png',                  url: 'https://www.bilibili.com/video/BV1644y1i7fc', vt: '腰间的肉不好看，该如何锻炼才有型？' },
    plank:    { name: '平板支撑',    targets: ['核心', '肩膀'],         art: A + 'plank.png',                   url: 'https://www.bilibili.com/video/BV16e4y1p7ji', vt: '这个练习，能让俯卧撑数量飞速提升!' },
    deadlift: { name: '哑铃硬拉',    targets: ['臀部', '大腿后侧', '背部'], art: A + 'dumbbell-deadlift.png',       url: 'https://www.bilibili.com/video/BV14B4y1176U', vt: '最糟糕的8个哑铃动作，永远不要这样练！' },
    sldl:     { name: '单腿硬拉',    targets: ['臀部', '大腿后侧'],     art: A + 'single-leg-deadlift.png',     url: 'https://www.bilibili.com/video/BV17w411N7hz', vt: '不练这里，所有体态问题都难解决!（强化根基）' },
  };
  // 唤醒日固定动作（只有猫牛式配教程视频）
  const WAKE = [
    { name: '原地踏步',   targets: ['髋部', '大腿前侧'], reps: '1 分钟', art: A + 'march-in-place.png' },
    { name: '肩绕环',     targets: ['肩关节', '上背'],   reps: '10 次',  art: A + 'shoulder-circles.png' },
    { name: '髋关节绕环', targets: ['髋部'],             reps: '10 次',  art: A + 'hip-circles.png' },
    { name: '徒手深蹲',   targets: ['大腿前侧', '臀部'], reps: '10 次',  art: A + 'deep-squat.png' },
    { name: '猫牛式',     targets: ['脊柱', '核心'],     reps: '8 次',   art: A + 'cat-cow.png', url: 'https://www.bilibili.com/video/BV1dd4y1N7RM', vt: '猫牛式 | 伸展脊柱 缓解腰背痛 新人必看' },
  ];
  // 周日=0 … 周六=6；未列出的天 = 身体唤醒日（周二/四/六/日）
  const PLAN = {
    1: { title: '深蹲 + 推 + 核心', ex: ['squat', 'sumo', 'pushup', 'pushup2', 'crunch', 'plank'] },
    3: { title: '硬拉 + 拉 + 核心', ex: ['deadlift', 'sldl', 'row', 'curl', 'crunch', 'plank'] },
    5: { title: '深蹲 + 肩推 + 拉', ex: ['squat', 'sumo', 'press', 'leanpush', 'row', 'curl'] },
  };
  const WEEKDAY = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
  const TAG_ASSET = {
    '胸肌': 'chest', '上胸': 'chest', '单侧胸肌': 'chest',
    '肩膀': 'shoulders', '肩关节': 'shoulders', '肩颈': 'shoulders', '三角肌': 'shoulders', '三角肌前束': 'shoulders', '三角肌后束': 'shoulders',
    '三头肌': 'triceps', '肱三头肌': 'triceps',
    '二头肌': 'biceps', '肱二头肌': 'biceps',
    '背部': 'back', '上背': 'back', '背阔肌': 'back', '脊柱': 'back',
    '核心': 'core', '核心稳定': 'core', '腹肌': 'core', '腹直肌': 'core', '下腹': 'core', '腹斜肌': 'core', '平衡': 'core',
    '大腿前侧': 'quads', '腿部': 'quads',
    '大腿后侧': 'hamstrings',
    '臀部': 'glutes',
    '髋部': 'hips',
  };
  const CIRC = 452.4, KEY = 'fit-daily-v2';

  // 依本地星期几解析当天计划：训练日 3 组/45 秒休息；唤醒日 1 组/15 秒调整。
  function todayPlan() {
    const d = new Date().getDay();
    const p = PLAN[d];
    if (!p) return { wake: true,  day: d, title: '身体唤醒', ex: WAKE,                  cycles: 1, rest: 15 };
    return         { wake: false, day: d, title: p.title,   ex: p.ex.map(k => LIB[k]), cycles: 3, rest: 45 };
  }

  let plan, EX, REST, CYCLES, dayStamp;
  let idx = 0, done = [], cycles = [], resting = false, endAt = 0, timerId = null;

  const $ = id => document.getElementById(id);
  const queue = $('queue');
  const muscleTag = name => {
    const asset = TAG_ASSET[name] || 'core';
    return '<span class="tag"><img src="assets/muscle-tags/png/' + asset + '.png" alt="' + name + '" decoding="async"></span>';
  };

  // ponytail: state lives in module vars; localStorage only guards against a mid-workout refresh
  function save() { try { localStorage.setItem(KEY, JSON.stringify({ d: done, c: cycles, i: idx, dt: dayStamp })); } catch (e) {} }
  function load() {
    try {
      const s = JSON.parse(localStorage.getItem(KEY));
      if (s && s.dt === dayStamp && Array.isArray(s.d) && s.d.length === EX.length) {
        done = s.d; idx = s.i;
        cycles = Array.isArray(s.c) && s.c.length === EX.length ? s.c : EX.map(() => 0);
      }
    } catch (e) {}
  }

  function fmt(sec) { return '00:' + String(sec).padStart(2, '0'); }
  function allDone() { return done.every(Boolean); }

  function buildQueue() {
    queue.innerHTML = '';
    EX.forEach((ex, i) => {
      const b = document.createElement('button');
      b.className = 'q-item';
      b.innerHTML =
        '<span class="q-mark"></span>' +
        '<span class="q-name">' + ex.name + '<small>' + ex.targets.join(' · ') + '</small></span>' +
        '<span class="q-fig"><img src="' + ex.art + '" alt=""></span>' +
        '<span class="q-done" aria-hidden="true">✓</span>';
      b.addEventListener('click', () => {
        stopTimer(); resting = false; idx = i; render();
      });
      queue.appendChild(b);
    });
  }

  function render() {
    EX.forEach((ex, i) => {
      const b = queue.children[i];
      b.classList.toggle('done', done[i]);
      b.classList.toggle('current', i === idx && !allDone());
      b.querySelector('.q-mark').textContent = i + 1;
    });
    // 计数 = 当前第几个动作（参考图语义：3/6 = 正在做第3个），完赛时 6/6
    const pos = allDone() ? EX.length : (idx + 1);
    $('progNum').textContent = pos;
    $('progBar').style.width = (pos / EX.length * 100) + '%';

    if (allDone()) { renderFinish(); return; }

    const ex = EX[idx];
    const set = Math.min(cycles[idx] + 1, CYCLES);
    $('exName').textContent = ex.name;
    $('rxLine').innerHTML = plan.wake
      ? '<b>' + ex.reps + '</b> · 完成后调整呼吸 <b>' + REST + ' 秒</b>'
      : '<b>第 ' + set + '/' + CYCLES + ' 组</b> · 8–10 次 · 完成后休息 <b>30–45 秒</b>';
    $('tags').innerHTML = ex.targets.map(muscleTag).join('');
    $('figBox').innerHTML = '<img class="exercise-art" src="' + ex.art + '" alt="' + ex.name + ' 动作示意">';
    if (ex.url) { $('tut').href = ex.url; $('tutTitle').textContent = ex.vt; $('tut').style.display = ''; }
    else { $('tut').style.display = 'none'; }
    $('tags').style.display = '';
    $('skipBtn').style.display = '';

    const btn = $('doneBtn');
    btn.style.display = '';
    if (resting) {
      btn.classList.add('resting');
      btn.textContent = '休息中 · 点击跳过 →';
    } else {
      btn.classList.remove('resting');
      btn.innerHTML = '✓&nbsp; 完成，开始休息';
      $('clock').textContent = fmt(REST);
      $('clockSub').textContent = '准备就绪';
      $('ringProg').style.strokeDashoffset = 0;
      setTip('💡', plan.wake
        ? '完成「' + ex.name + '」后，点击下方按钮开始短暂调整。'
        : '完成第 ' + set + ' 组「' + ex.name + '」后，点击下方按钮开始休息计时。');
    }
  }

  function setTip(ico, text) { $('tipIco').textContent = ico; $('tipText').textContent = text; }

  function stopTimer() { if (timerId) { clearInterval(timerId); timerId = null; } }

  function startRest() {
    resting = true;
    endAt = Date.now() + REST * 1000;
    setTip('💪', done[idx] ? '干得漂亮！喘口气，休息结束自动进入下一个动作。' : '干得漂亮！喘口气，休息结束自动开始下一组。');
    $('clockSub').textContent = '休息中';
    render();
    tick();
    timerId = setInterval(tick, 200);
  }

  function tick() {
    const remain = Math.max(0, Math.ceil((endAt - Date.now()) / 1000));
    $('clock').textContent = fmt(remain);
    $('clockSub').textContent = '休息中';
    $('ringProg').style.strokeDashoffset = CIRC * (1 - remain / REST);
    if (remain <= 0) endRest();
  }

  function nextUndone() {
    for (let k = 1; k <= EX.length; k++) {
      const j = (idx + k) % EX.length;
      if (!done[j]) return j;
    }
    return -1;
  }

  function endRest() {
    stopTimer();
    resting = false;
    if (done[idx]) {                      // 3 组全部完成才前进到下一动作
      const next = nextUndone();
      if (next >= 0) idx = next;
    }
    save();
    render();
  }

  function skipExercise() {               // 跳过当前动作剩余组数
    stopTimer();
    resting = false;
    done[idx] = true;
    const next = nextUndone();
    if (next >= 0) idx = next;
    save();
    render();
  }

  function renderFinish() {
    $('exName').textContent = plan.wake ? '身体唤醒完成！' : '今日训练完成！';
    $('rxLine').innerHTML = plan.wake
      ? '关节舒展、气血流动，<b>元气满满开始新的一天 →</b>'
      : '身体已激活，<b>收拾收拾出发去健身房吧 →</b>';
    $('tags').style.display = 'none';
    $('figBox').innerHTML =
      '<div class="pop"><img class="finish-art" src="assets/finish-icon-options/c-star-cup.svg" alt="完成奖杯">' +
      '<div class="celebrate-msg">' + EX.length + ' 个动作全部完成</div>' +
      '<div class="celebrate-sub">' + (plan.wake ? '身体已唤醒，元气满满开始新的一天！' : '坚持就是胜利，明天同一时间见！') + '</div></div>';
    $('tut').style.display = 'none';
    $('skipBtn').style.display = 'none';
    const btn = $('doneBtn');
    btn.style.display = '';
    btn.classList.remove('resting');
    btn.textContent = '↺ 再练一遍';
    $('clock').textContent = '✓';
    $('clockSub').textContent = '全部完成';
    $('ringProg').style.strokeDashoffset = 0;
    setTip('✓', '今日 ' + EX.length + ' 个动作全部完成，明天见！');
  }

  $('doneBtn').addEventListener('click', () => {
    if (allDone()) {                      // 再练一遍
      done = EX.map(() => false); cycles = EX.map(() => 0); idx = 0; resting = false; stopTimer(); save(); render(); return;
    }
    if (resting) { endRest(); return; }   // 跳过休息
    cycles[idx]++;                        // 完成一组
    if (cycles[idx] >= CYCLES) done[idx] = true;
    save();
    if (allDone()) { stopTimer(); resting = false; render(); }
    else startRest();
  });

  $('skipBtn').addEventListener('click', skipExercise);

  // 载入当天计划，刷新标题/头部/页脚文案
  function applyPlan() {
    plan = todayPlan();
    EX = plan.ex; REST = plan.rest; CYCLES = plan.cycles;
    dayStamp = new Date().toDateString();
    const label = WEEKDAY[plan.day] + ' · ' + plan.title;
    document.title = '今日 · ' + label;
    $('dayTitle').textContent = label;
    document.querySelector('.top-title .eyebrow').textContent = plan.wake ? '今日 · 身体唤醒' : '今日训练 · 出发前激活';
    $('progTotal').textContent = ' / ' + EX.length;
    $('skipBtn').textContent = plan.wake ? '跳过这个动作 →' : '跳过剩余组，下一动作 →';
    $('note').textContent = plan.wake
      ? '今天是身体唤醒日：唤醒关节、活络气血、舒展脊柱，为一天注入活力。动作轻柔，量力而行，不追求强度——徒手即可，随时随地都能做。'
      : '前2周维持8–10次；熟练后升到10–15次。留有余力，不追求力竭——这是去健身房前的身体激活，不是正式训练。器材：徒手 + 2×5kg哑铃。';
  }

  function init() {
    stopTimer();
    applyPlan();
    done = EX.map(() => false); cycles = EX.map(() => 0); idx = 0; resting = false;
    load();
    buildQueue();
    render();
  }

  // 过凌晨0点自动切换到新一天：轮询 + 切回前台时立即校正
  setInterval(() => { if (new Date().toDateString() !== dayStamp) init(); }, 30000);
  document.addEventListener('visibilitychange', () => { if (!document.hidden && new Date().toDateString() !== dayStamp) init(); });

  init();
</script>
